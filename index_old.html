<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam.AI - Your Personal Gaming Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --accent2: #0099ff;
            --text: #e0e0e0;
            --muted: #666;
            --green: #4caf50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .chat-sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-item.active {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .chat-item-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
        }

        .chat-item-date {
            font-size: 11px;
            color: var(--muted);
            margin-left: 8px;
        }

        .chat-item-actions {
            display: none;
            gap: 4px;
        }

        .chat-item:hover .chat-item-actions {
            display: flex;
        }

        .chat-action-btn {
            background: none;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            padding: 4px;
            font-size: 12px;
        }

        .chat-action-btn:hover {
            color: #00d4ff;
        }

        .chat-action-btn.delete:hover {
            color: #f44336;
        }

        .main-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            min-height: 100vh;
        }

        .main-content {
            display: none;
        }

        .setup-section {
            background: var(--panel);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #2a2a4a;
        }

        h1 {
            font-size: 3em;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2, h3, h4 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.2em;
            color: #a0a0a0;
        }

        /* Gaming Profile Section */
        .profile-section {
            margin-bottom: 30px;
        }

        .profile-section h3 {
            color: var(--accent);
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Hero Headline */
        .hero-headline-container {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .hero-headline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .share-button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
        }

        .share-button:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Last Analysis Banner */
        .last-analysis-banner {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 153, 255, 0.05));
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        .last-analysis-info {
            font-size: 13px;
            color: var(--text);
        }

        .last-analysis-info strong {
            color: var(--accent);
        }

        .score-change {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .score-change.up {
            background: rgba(76, 175, 80, 0.2);
            color: var(--green);
        }

        .score-change.down {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        /* Shame Score */
        .shame-score-container {
            text-align: center;
            padding: 40px 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .shame-score-number {
            font-family: 'Rajdhani', sans-serif;
            font-size: 120px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 10px;
        }

        .shame-score-label {
            font-size: 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .shame-score-verdict {
            font-size: 16px;
            color: var(--text);
            font-weight: 500;
        }

        /* Weekly Pick Card */
        .weekly-pick-card {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(76, 175, 80, 0.05));
            border: 2px solid var(--green);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .weekly-pick-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .weekly-pick-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--green);
        }

        .refresh-pick-btn {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
        }

        .refresh-pick-btn:hover {
            background: var(--green);
            color: var(--bg);
        }

        .weekly-pick-content {
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
        }

        /* Return to Game Section */
        .return-game-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .return-game-card h3 {
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .return-game-selector {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .return-game-selector select {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .return-game-selector button {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            border: none;
            color: var(--bg);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .reentry-guide {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-top: 15px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reentry-guide h4 {
            color: var(--accent);
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reentry-guide ul {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
        }

        .reentry-guide li {
            color: var(--text);
            font-size: 13px;
            padding: 5px 0;
            padding-left: 15px;
            position: relative;
        }

        .reentry-guide li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        /* Momentum Tracking */
        .momentum-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .momentum-card h3 {
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .momentum-section {
            margin-bottom: 20px;
        }

        .momentum-section h4 {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .momentum-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .momentum-item .game-name {
            color: var(--text);
        }

        .momentum-item .game-hours {
            color: var(--green);
        }

        .momentum-item .game-hours.negative {
            color: #f44336;
        }

        .momentum-trend {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent);
            padding: 12px 15px;
            font-size: 13px;
            color: var(--text);
            margin-top: 15px;
        }

        /* Backlog Breakdown */
        .backlog-breakdown {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .backlog-breakdown h3 {
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .backlog-table {
            width: 100%;
            border-collapse: collapse;
        }

        .backlog-table th {
            text-align: left;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 5px;
            border-bottom: 1px solid var(--border);
        }

        .backlog-table td {
            padding: 10px 5px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .backlog-table .game-name {
            color: var(--text);
        }

        .backlog-table .hours {
            color: var(--muted);
        }

        .backlog-table .completion {
            font-weight: 600;
        }

        .completion-low {
            color: #f44336;
        }

        .completion-medium {
            color: #ffc107;
        }

        .completion-high {
            color: var(--green);
        }

        .backlog-section-label {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 0;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        /* Graveyard */
        .graveyard-card {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.1), rgba(244, 67, 54, 0.05));
            border: 2px solid #f44336;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .graveyard-card h3 {
            color: #f44336;
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .graveyard-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .graveyard-item {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            color: var(--text);
            text-align: center;
        }

        .graveyard-challenge {
            color: var(--muted);
            font-size: 13px;
            font-style: italic;
            margin-bottom: 15px;
        }

        .revive-btn {
            background: transparent;
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
        }

        .revive-btn:hover {
            background: #f44336;
            color: var(--bg);
        }

        /* Top 10 Bar Chart */
        .bar-chart {
            margin: 20px 0;
        }

        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .bar-row:nth-child(1) { animation-delay: 0.1s; }
        .bar-row:nth-child(2) { animation-delay: 0.15s; }
        .bar-row:nth-child(3) { animation-delay: 0.2s; }
        .bar-row:nth-child(4) { animation-delay: 0.25s; }
        .bar-row:nth-child(5) { animation-delay: 0.3s; }
        .bar-row:nth-child(6) { animation-delay: 0.35s; }
        .bar-row:nth-child(7) { animation-delay: 0.4s; }
        .bar-row:nth-child(8) { animation-delay: 0.45s; }
        .bar-row:nth-child(9) { animation-delay: 0.5s; }
        .bar-row:nth-child(10) { animation-delay: 0.55s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .bar-label {
            width: 200px;
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-container {
            flex: 1;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease-out;
            position: relative;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
        }

        .bar-value {
            width: 60px;
            text-align: right;
            font-size: 13px;
            color: var(--muted);
            padding-left: 10px;
        }

        /* Library DNA Tags */
        .dna-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dna-tag {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 255, 0.1));
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Brutal Stats */
        .brutal-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stat-card .stat-number {
            font-size: 28px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .stat-sublabel {
            font-size: 10px;
            color: var(--muted);
            margin-top: 5px;
        }

        /* Most Played vs Never Played */
        .comparison-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .comparison-column {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        .comparison-column h4 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .comparison-column.time h4 {
            color: var(--accent);
        }

        .comparison-column.money h4 {
            color: #f44336;
        }

        .game-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-item:last-child {
            border-bottom: none;
        }

        .game-item .name {
            color: var(--text);
            font-size: 13px;
        }

        .game-item .hours {
            color: var(--muted);
            font-size: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            font-family: 'IBM Plex Mono', monospace;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        button {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .main-content {
            display: none;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .mood-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .mood-btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mood-btn:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
        }

        .mood-btn.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
        }

        .game-recommendation {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .game-title {
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .game-reason {
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .verdict {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            display: inline-block;
            margin: 5px 0;
        }

        .verdict.yes {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .verdict.maybe {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .verdict.kidding {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
        }

        .message.user {
            background: rgba(0, 212, 255, 0.2);
            align-self: flex-end;
            text-align: right;
        }

        .message.assistant {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 600;
            color: #00d4ff;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .chat-sidebar {
                width: 60px;
            }
            
            .sidebar-header h3,
            .chat-item-title,
            .chat-item-date {
                display: none;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Chat Sidebar -->
        <aside class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <h3 style="color: #00d4ff; margin-bottom: 15px;">💬 Chat History</h3>
                <button class="new-chat-btn" onclick="createNewChat()">
                    <span>+</span> New Chat
                </button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- Main Content -->
        <div class="main-content-area">
            <div class="container">
                <header>
                    <h1>Steam.AI</h1>
                    <p class="subtitle">Your personal gaming assistant powered by real Steam data</p>
                </header>

                <section id="setup" class="setup-section">
                    <h2>Setup Your Steam.AI</h2>
                    
                    <div class="input-group">
                        <label for="steamApiKey">Steam API Key</label>
                        <input type="text" id="steamApiKey" placeholder="Enter your Steam API key">
                    </div>

                    <div class="input-group">
                        <label for="steamId">Steam ID</label>
                        <input type="text" id="steamId" placeholder="Enter your Steam ID">
                    </div>

                    <div class="input-group">
                        <label for="claudeApiKey">Claude API Key</label>
                        <input type="password" id="claudeApiKey" placeholder="Enter your Claude API key">
                    </div>

                    <button onclick="initializeApp()">Initialize Steam.AI</button>
                    
                    <div id="setupError" class="error hidden"></div>
                    <div id="setupSuccess" class="success hidden"></div>
                </section>

                <main id="mainContent" class="main-content">
                    <div class="dashboard">
                        <!-- Last Analysis Banner -->
                        <div id="lastAnalysisBanner"></div>
                        
                        <!-- Hero Headline -->
                        <div id="heroHeadline"></div>
                        
                        <!-- Shame Score -->
                        <div id="shameScore"></div>
                        
                        <!-- Weekly Pick -->
                        <div id="weeklyPick"></div>
                        
                        <!-- Momentum Tracking -->
                        <div id="momentumTracking"></div>
                        
                        <!-- Return to Game -->
                        <div id="returnToGame"></div>
                        
                        <!-- Backlog Breakdown -->
                        <div id="backlogBreakdown"></div>
                        
                        <!-- Graveyard -->
                        <div id="graveyard"></div>
                        
                        <div class="card profile-section">
                            <h3>🎮 Gaming Profile</h3>
                            
                            <!-- Top 10 Games Bar Chart -->
                            <div id="topGamesChart"></div>
                            
                            <!-- Library DNA Tags -->
                            <div id="libraryDNA"></div>
                            
                            <!-- Brutal Stats -->
                            <div id="brutalStats"></div>
                            
                            <!-- Most Played vs Never Played -->
                            <div id="comparisonSection"></div>
                        </div>

                        <div class="card">
                            <h3>🎯 Play Tonight</h3>
                            <div class="input-group">
                                <label for="availableTime">Available Time</label>
                                <select id="availableTime">
                                    <option value="30">Under 30 minutes</option>
                                    <option value="60">30-60 minutes</option>
                                    <option value="120">1-2 hours</option>
                                    <option value="180">2-3 hours</option>
                                    <option value="240">3+ hours</option>
                                </select>
                            </div>
                            
                            <div class="input-group">
                                <label>Select Your Mood</label>
                                <div class="mood-selector">
                                    <div class="mood-btn" data-mood="relaxed">😌 Relaxed</div>
                                    <div class="mood-btn" data-mood="focused">🎯 Focused</div>
                                    <div class="mood-btn" data-mood="creative">🎨 Creative</div>
                                    <div class="mood-btn" data-mood="competitive">⚔️ Competitive</div>
                                    <div class="mood-btn" data-mood="social">👥 Social</div>
                                    <div class="mood-btn" data-mood="adventurous">🗺️ Adventure</div>
                                </div>
                            </div>
                            
                            <button onclick="getRecommendations()">Get Recommendations</button>
                            <div id="recommendations"></div>
                        </div>

                        <div class="card">
                            <h3>🛒 Wishlist Analysis</h3>
                            <button onclick="analyzeWishlist()">Analyze My Wishlist</button>
                            <div id="wishlistAnalysis"></div>
                        </div>

                        <div class="card">
                            <h3>💬 Chat with Steam.AI</h3>
                            <div class="chat-container">
                                <div class="chat-messages" id="chatMessages"></div>
                                <div class="chat-input">
                                    <input type="text" id="chatInput" placeholder="Ask about your games, recommendations, or gaming habits...">
                                    <button onclick="sendMessage()">Send</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let steamData = {
            games: [],
            wishlist: [],
            profile: null,
            apiKey: '',
            steamId: '',
            claudeApiKey: ''
        };

        // Chat state
        let chatState = {
            chats: {}, // { chatId: { id, title, messages: [], createdAt, updatedAt } }
            currentChatId: null
        };

        // Analysis state
        let analysisState = {
            shameScore: 0,
            heroHeadline: '',
            lastSession: null,
            weeklyPick: null
        };

        // Initialize app
        async function initializeApp() {
            const steamApiKey = document.getElementById('steamApiKey').value.trim();
            const steamId = document.getElementById('steamId').value.trim();
            const claudeApiKey = document.getElementById('claudeApiKey').value.trim();

            if (!steamApiKey || !steamId || !claudeApiKey) {
                showSetupError('Please fill in all required fields');
                return;
            }

            showLoading(true);
            
            // Force UI to show after 5 seconds regardless
            const forceShowUI = setTimeout(() => {
                console.log('Force showing UI after timeout');
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('mainContent').style.display = 'block';
                showLoading(false);
            }, 5000);
            
            try {
                // Store API keys
                steamData.apiKey = steamApiKey;
                steamData.steamId = steamId;
                steamData.claudeApiKey = claudeApiKey;
                
                // Save to localStorage
                localStorage.setItem('steamData', JSON.stringify({
                    apiKey: steamApiKey,
                    steamId: steamId,
                    claudeApiKey: claudeApiKey
                }));

                console.log('API keys saved, fetching Steam data...');
                
                // Load previous session data
                loadLastSession();
                
                // Try to fetch Steam data
                try {
                    await fetchSteamData();
                    console.log('Steam data fetched successfully');
                } catch (steamError) {
                    console.error('Steam API failed, using demo data:', steamError);
                    // Use demo data as fallback
                    loadDemoData();
                }
                
                console.log('Showing main content...');
                
                // Clear the timeout since we're showing UI now
                clearTimeout(forceShowUI);
                
                // Show main content
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('mainContent').style.display = 'block';
                
                console.log('Main content should be visible now');
                
                showSetupSuccess('Steam.AI initialized successfully!');
                
            } catch (error) {
                console.error('Initialization error:', error);
                clearTimeout(forceShowUI);
                showSetupError(`Failed to initialize: ${error.message}`);
                
                // Still show UI on error
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('mainContent').style.display = 'block';
            } finally {
                showLoading(false);
            }
        }

        // Load demo data for testing
        function loadDemoData() {
            steamData.games = [
                { name: "Counter-Strike 2", appid: 730, playtime_forever: 2750, img_icon_url: "", img_logo_url: "" },
                { name: "Dota 2", appid: 570, playtime_forever: 1200, img_icon_url: "", img_logo_url: "" },
                { name: "Stardew Valley", appid: 413150, playtime_forever: 450, img_icon_url: "", img_logo_url: "" },
                { name: "Hades", appid: 1145360, playtime_forever: 180, img_icon_url: "", img_logo_url: "" },
                { name: "Among Us", appid: 945360, playtime_forever: 90, img_icon_url: "", img_logo_url: "" },
                { name: "Valheim", appid: 892970, playtime_forever: 0, img_icon_url: "", img_logo_url: "" },
                { name: "Cyberpunk 2077", appid: 1091500, playtime_forever: 0, img_icon_url: "", img_logo_url: "" },
                { name: "Minecraft", appid: 239850, playtime_forever: 320, img_icon_url: "", img_logo_url: "" }
            ];
            
            steamData.wishlist = [
                { name: "Baldur's Gate 3", appid: 1086940, release_date: "Aug 3, 2023", price: "$59.99", reviews_summary: "Overwhelmingly Positive", tags: ["RPG", "Adventure"] },
                { name: "Elden Ring", appid: 1245620, release_date: "Feb 25, 2022", price: "$59.99", reviews_summary: "Overwhelmingly Positive", tags: ["Action", "RPG"] },
                { name: "Starfield", appid: 1716740, release_date: "Sep 6, 2023", price: "$69.99", reviews_summary: "Mostly Positive", tags: ["RPG", "Open World"] }
            ];
            
            updateStats();
            
            console.log('Using demo data with', steamData.games.length, 'games');
        }

        // Fetch Steam data
        async function fetchSteamData() {
            try {
                console.log('Fetching Steam data for:', steamData.steamId);
                
                // Use local proxy server to avoid CORS
                const gamesUrl = `http://localhost:3001/api/steam?apikey=${steamData.apiKey}&steamid=${steamData.steamId}`;
                
                console.log('Fetching from:', gamesUrl);
                
                const gamesResponse = await fetch(gamesUrl);
                console.log('Response status:', gamesResponse.status);
                
                if (!gamesResponse.ok) {
                    const errorText = await gamesResponse.text();
                    console.error('API Error:', errorText);
                    throw new Error(`Steam API error: ${gamesResponse.status} - ${errorText}`);
                }
                
                const gamesData = await gamesResponse.json();
                console.log('Games data:', gamesData);
                
                if (gamesData.response && gamesData.response.games) {
                    steamData.games = gamesData.response.games;
                    console.log(`Loaded ${steamData.games.length} games`);
                } else {
                    console.error('No games in response:', gamesData);
                    throw new Error('No games found in Steam response. Your profile might be private.');
                }
                
                // Skip wishlist for now - it's failing
                steamData.wishlist = [];
                console.log('Skipping wishlist fetch');
                
                // Update UI immediately
                console.log('Calling updateStats...');
                updateStats();
                console.log('Stats updated');
                
            } catch (error) {
                console.error('Error fetching Steam data:', error);
                throw error;
            }
        }

        // Update statistics
        function updateStats() {
            try {
                console.log('updateStats called');
                
                // Calculate and render shame score first
                calculateShameScore();
                
                // Render all profile components
                renderTopGamesChart();
                renderBrutalStats();
                renderComparisonSection();
                
                // Render new behavioral features
                renderReturnToGame();
                renderBacklogBreakdown();
                renderGraveyard();
                
                // Load momentum tracking
                loadMomentumTracking();
                
                // Generate DNA tags in background
                generateLibraryDNA().then(() => {
                    // After DNA tags, generate hero headline
                    generateHeroHeadline();
                }).catch(err => {
                    console.error('DNA generation failed:', err);
                    document.getElementById('libraryDNA').innerHTML = '<div class="dna-tags"><span class="dna-tag">PROFILE UNAVAILABLE</span></div>';
                });
                
                // Generate weekly pick if not already saved
                loadOrGenerateWeeklyPick();
                
                // Save current session
                saveCurrentSession();
                
                console.log('Stats updated successfully');
            } catch (error) {
                console.error('Error in updateStats:', error);
            }
        }

        // Calculate Backlog Shame Score
        function calculateShameScore() {
            let score = 100;
            
            steamData.games.forEach(game => {
                const hours = (game.playtime_forever || 0) / 60;
                
                if (hours === 0) {
                    score -= 0.5; // Unplayed
                } else if (hours < 1) {
                    score -= 0.2; // Under 1 hour
                } else if (hours >= 1 && hours <= 5) {
                    score -= 0.1; // 1-5 hours
                } else if (hours > 20) {
                    score += 0.3; // Over 20 hours
                }
            });
            
            // Clamp to 0-100
            score = Math.max(0, Math.min(100, Math.round(score)));
            analysisState.shameScore = score;
            
            // Render shame score
            renderShameScore(score);
        }

        // Render Shame Score
        function renderShameScore(score) {
            let verdict = '';
            let verdictColor = 'var(--text)';
            
            if (score >= 80) {
                verdict = "RESPECTABLE. You actually play what you buy.";
            } else if (score >= 60) {
                verdict = "AVERAGE HOARDER. Room for improvement.";
            } else if (score >= 40) {
                verdict = "CHRONIC HOARDER. Steam sales are your weakness.";
            } else {
                verdict = "FULL SHAME. Your library is a graveyard.";
            }
            
            const html = `
                <div class="shame-score-container">
                    <div class="shame-score-number">${score}</div>
                    <div class="shame-score-label">BACKLOG SHAME SCORE</div>
                    <div class="shame-score-verdict">${verdict}</div>
                </div>
            `;
            
            document.getElementById('shameScore').innerHTML = html;
        }

        // Load last session from localStorage
        function loadLastSession() {
            try {
                const saved = localStorage.getItem('steamai_last_session');
                if (saved) {
                    analysisState.lastSession = JSON.parse(saved);
                    renderLastAnalysisBanner();
                }
            } catch (error) {
                console.error('Error loading last session:', error);
            }
        }

        // Render Last Analysis Banner
        function renderLastAnalysisBanner() {
            if (!analysisState.lastSession) return;
            
            const last = analysisState.lastSession;
            const date = new Date(last.timestamp);
            const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            // Calculate hours played since last visit
            let newHours = 0;
            if (last.topGames) {
                last.topGames.forEach(savedGame => {
                    const currentGame = steamData.games.find(g => g.appid === savedGame.appid);
                    if (currentGame) {
                        const diff = (currentGame.playtime_forever || 0) - (savedGame.playtime_forever || 0);
                        if (diff > 0) newHours += diff / 60;
                    }
                });
            }
            
            // Calculate score change
            const scoreDiff = analysisState.shameScore - (last.shameScore || 0);
            let scoreChangeHtml = '';
            
            if (last.shameScore && scoreDiff !== 0) {
                const direction = scoreDiff > 0 ? 'up' : 'down';
                scoreChangeHtml = `<span class="score-change ${direction}">${scoreDiff > 0 ? '+' : ''}${scoreDiff}</span>`;
            }
            
            const html = `
                <div class="last-analysis-banner">
                    <div class="last-analysis-info">
                        <strong>Last Analysis:</strong> ${dateStr} &nbsp;|&nbsp; 
                        Score: ${last.shameScore || 'N/A'} ${scoreChangeHtml}
                        ${newHours > 0 ? `&nbsp;|&nbsp; <strong>${newHours.toFixed(1)}h</strong> played since last visit` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('lastAnalysisBanner').innerHTML = html;
        }

        // Save current session to localStorage
        function saveCurrentSession() {
            const top5 = steamData.games
                .sort((a, b) => (b.playtime_forever || 0) - (a.playtime_forever || 0))
                .slice(0, 5)
                .map(g => ({ appid: g.appid, name: g.name, playtime_forever: g.playtime_forever }));
            
            const sessionData = {
                timestamp: Date.now(),
                shameScore: analysisState.shameScore,
                heroHeadline: analysisState.heroHeadline,
                topGames: top5,
                unplayedCount: steamData.games.filter(g => (g.playtime_forever || 0) === 0).length
            };
            
            localStorage.setItem('steamai_last_session', JSON.stringify(sessionData));
            analysisState.lastSession = sessionData;
        }

        // Generate Hero Headline from AI analysis
        async function generateHeroHeadline() {
            // Get top 20 games for context
            const top20 = steamData.games
                .sort((a, b) => (b.playtime_forever || 0) - (a.playtime_forever || 0))
                .slice(0, 20)
                .map(g => `${g.name}: ${Math.round((g.playtime_forever || 0) / 60)}h`)
                .join('\n');
            
            const prompt = `Analyze this Steam library and extract ONE brutally honest, interesting sentence about this player's gaming personality. Make it provocative, specific, and memorable.

LIBRARY DATA:
${top20}

Total games: ${steamData.games.length}
Unplayed: ${steamData.games.filter(g => (g.playtime_forever || 0) === 0).length}
Shame Score: ${analysisState.shameScore}/100

Respond with ONLY one sentence. No quotes, no explanation. Maximum 15 words. Make it sting or surprise.

Examples:
- "You've spent 4000 hours in PUBG but own 150 unplayed RPGs"
- "Your library is a monument to Steam sale regret"
- "You're not a gamer, you're a game collector"`;
            
            try {
                const headline = await callClaude(prompt);
                analysisState.heroHeadline = headline.trim();
                renderHeroHeadline(analysisState.heroHeadline);
            } catch (error) {
                console.error('Error generating headline:', error);
                analysisState.heroHeadline = "Your library speaks volumes about your gaming habits";
                renderHeroHeadline(analysisState.heroHeadline);
            }
        }

        // Render Hero Headline
        function renderHeroHeadline(headline) {
            const html = `
                <div class="hero-headline-container">
                    <div class="hero-headline">${headline}</div>
                    <button class="share-button" onclick="shareHeadline('${headline.replace(/'/g, "\\'")}')">
                        📋 SHARE THIS
                    </button>
                </div>
            `;
            
            document.getElementById('heroHeadline').innerHTML = html;
        }

        // Share headline to clipboard
        function shareHeadline(headline) {
            const text = `Steam.AI told me: "${headline}" — steamai.com`;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
                // Fallback
                prompt('Copy this:', text);
            });
        }

        // Load or generate weekly pick
        async function loadOrGenerateWeeklyPick() {
            try {
                const saved = localStorage.getItem('steamai_weekly_pick');
                if (saved) {
                    const pickData = JSON.parse(saved);
                    const pickDate = new Date(pickData.timestamp);
                    const now = new Date();
                    
                    // Check if pick is from this week
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    
                    if (pickDate > weekAgo) {
                        analysisState.weeklyPick = pickData;
                        renderWeeklyPick(pickData);
                        return;
                    }
                }
                
                // Generate new pick
                await generateWeeklyPick();
            } catch (error) {
                console.error('Error loading weekly pick:', error);
            }
        }

        // Generate Weekly Pick
        async function generateWeeklyPick() {
            // Find games with low playtime (< 5 hours)
            const unplayedOrLow = steamData.games
                .filter(g => (g.playtime_forever || 0) < 300 && (g.playtime_forever || 0) > 0)
                .sort((a, b) => (a.playtime_forever || 0) - (b.playtime_forever || 0))
                .slice(0, 20);
            
            if (unplayedOrLow.length === 0) {
                document.getElementById('weeklyPick').innerHTML = '';
                return;
            }
            
            const gamesList = unplayedOrLow.map(g => `${g.name}: ${Math.round((g.playtime_forever || 0) / 60)}h`).join('\n');
            
            const prompt = `Based on this player's library, pick ONE game they should play this week. They own it but haven't played much.

GAMES TO CHOOSE FROM:
${gamesList}

Respond in this exact format:
GAME: [game name]
WHY: [one sentence why this week specifically]
FIRST_10: [one sentence what to do in first 10 minutes]

Be specific and actionable. Make it feel like a timely recommendation.`;
            
            try {
                const response = await callClaude(prompt);
                
                // Parse response
                const gameMatch = response.match(/GAME:\s*(.+)/i);
                const whyMatch = response.match(/WHY:\s*(.+)/i);
                const first10Match = response.match(/FIRST_10:\s*(.+)/i);
                
                const pickData = {
                    game: gameMatch ? gameMatch[1].trim() : 'Unknown',
                    why: whyMatch ? whyMatch[1].trim() : '',
                    first10: first10Match ? first10Match[1].trim() : '',
                    timestamp: Date.now()
                };
                
                analysisState.weeklyPick = pickData;
                localStorage.setItem('steamai_weekly_pick', JSON.stringify(pickData));
                renderWeeklyPick(pickData);
            } catch (error) {
                console.error('Error generating weekly pick:', error);
            }
        }

        // Render Weekly Pick
        function renderWeeklyPick(pickData) {
            if (!pickData || !pickData.game) return;
            
            const html = `
                <div class="weekly-pick-card">
                    <div class="weekly-pick-header">
                        <div class="weekly-pick-title">🎯 THIS WEEK: ${pickData.game}</div>

        async function generateReentryGuide() {
            const select = document.getElementById('returnGameSelect');
            const option = select.options[select.selectedIndex];
            
            if (!option.value) {
                alert('Please select a game');
                return;
            }
            
            const gameName = option.dataset.name;
            const hours = option.dataset.hours;
            
            const topGames = steamData.games
                .sort((a, b) => (b.playtime_forever || 0) - (a.playtime_forever || 0))
                .slice(0, 10)
                .map(g => g.name)
                .join(', ');
            
            const prompt = `User has played ${gameName} for ${hours} hours but has not played recently.
Infer where they likely left off and generate a re-entry guide.

Return EXACTLY this format:

YOU LEFT OFF:
- (2–3 bullet points)

REMEMBER THIS:
- (2–3 bullet points)

DO THIS FIRST (10 mins):
- (2–3 bullet points)

Be specific, concise, and actionable. No fluff.`;
            
            document.getElementById('reentryGuide').innerHTML = '<div class="reentry-guide"><p style="color: var(--muted);">Generating re-entry guide...</p></div>';
            
            try {
                const response = await callClaude(prompt);
                
                // Parse sections
                const leftOffMatch = response.match(/YOU LEFT OFF:\s*([\s\S]*?)(?=REMEMBER THIS:|$)/i);
                const rememberMatch = response.match(/REMEMBER THIS:\s*([\s\S]*?)(?=DO THIS FIRST:|$)/i);
                const doFirstMatch = response.match(/DO THIS FIRST[^:]*:\s*([\s\S]*?)(?=$)/i);
                
                const parseBullets = (text) => {
                    if (!text) return [];
                    return text.trim().split('\n')
                        .map(line => line.replace(/^[\s\-\*]+/, '').trim())
                        .filter(line => line.length > 0);
                };
                
                const leftOffBullets = parseBullets(leftOffMatch ? leftOffMatch[1] : '');
                const rememberBullets = parseBullets(rememberMatch ? rememberMatch[1] : '');
                const doFirstBullets = parseBullets(doFirstMatch ? doFirstMatch[1] : '');
                
                const html = `
                    <div class="reentry-guide">
                        <h4>YOU LEFT OFF</h4>
                        <ul>${leftOffBullets.map(b => `<li>${b}</li>`).join('')}</ul>
                        
                        <h4>REMEMBER THIS</h4>
                        <ul>${rememberBullets.map(b => `<li>${b}</li>`).join('')}</ul>
                        
                        <h4>DO THIS FIRST (10 mins)</h4>
                        <ul>${doFirstBullets.map(b => `<li>${b}</li>`).join('')}</ul>
                    </div>
                `;
                
                document.getElementById('reentryGuide').innerHTML = html;
            } catch (error) {
                console.error('Error generating re-entry guide:', error);
                document.getElementById('reentryGuide').innerHTML = '<div class="reentry-guide"><p style="color: #f44336;">Failed to generate guide. Try again.</p></div>';
            }
        }

        function saveCurrentSnapshot() {
            const snapshot = {
                timestamp: Date.now(),
                games: steamData.games.map(g => ({
                    appid: g.appid,
                    name: g.name,
                    playtime_forever: g.playtime_forever || 0
                }))

            localStorage.setItem('steamai_last_snapshot', JSON.stringify(snapshot));
        }

        function calculateMomentum(lastSnapshot) {
            const now = Date.now();
            const lastTime = lastSnapshot.timestamp;
            const daysSince = (now - lastTime) / (1000 * 60 * 60 * 24);
            
            // Create map of last playtimes
            const lastPlaytimes = {};
            lastSnapshot.games.forEach(g => {
                lastPlaytimes[g.appid] = g.playtime_forever;
            });
            
            // Calculate categories
            const neglected = [];
            const revisited = [];
            const active = [];
            const backlogProgress = [];
            
            steamData.games.forEach(game => {
                const currentPlaytime = game.playtime_forever || 0;
                const lastPlaytime = lastPlaytimes[game.appid] || 0;
                const diff = currentPlaytime - lastPlaytime;
                const diffHours = diff / 60;
                
                // Check if neglected (not played in 30 days based on snapshot)
                if (lastPlaytime === currentPlaytime && currentPlaytime > 0) {
                    neglected.push({ game, diff: 0 });
                }
                
                // Check if revisited (was neglected, now has +30 mins)
                if (diff >= 30 && lastPlaytime > 0) {
                    revisited.push({ game, diff: diffHours });
                }
                
                // Check if active (played recently - has diff)
                if (diff > 0) {
                    active.push({ game, diff: diffHours });
                }
                
                // Track biggest increases
                if (diff > 30) { // More than 30 mins increase
                    backlogProgress.push({ game, diff: diffHours });
                }
            });
            
            return {
                daysSince: Math.round(daysSince),
                neglected: neglected.slice(0, 10),
                revisited: revisited.sort((a, b) => b.diff - a.diff),
                active: active.sort((a, b) => b.diff - a.diff),
                backlogProgress: backlogProgress.sort((a, b) => b.diff - a.diff).slice(0, 5)
            };
        }

        function calculateCompletionScore(hours) {
            if (hours === 0) return 0;
            if (hours < 2) return 10;

            if (hours < 25) return 60;
            if (hours < 50) return 85;
            return 100;

            // Lowest completion (played but not much)

                .filter(g => g.hours > 0 && g.completion < 60)
                .sort((a, b) => a.completion - b.completion)
                .slice(0, 10);

                .filter(g => g.completion >= 60 && g.completion < 100)

        // Share DNA Tags
        function shareDNATags() {
            const tags = analysisState.dnaTags || [];
            if (tags.length === 0) {
                alert('No DNA tags to share');
                return;
            }
            
            // Create a styled card using canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 600;
            canvas.height = 300;
            
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Border
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
            
            // Title
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 28px Rajdhani, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('MY STEAM DNA', canvas.width / 2, 60);
            
            // Tags
            ctx.font = '18px IBM Plex Mono, monospace';
            ctx.fillStyle = '#e0e0e0';
            
            const tagY = 120;
            const tagSpacing = 45;
            
            tags.forEach((tag, i) => {
                const y = tagY + (i * tagSpacing);
                
                // Tag background
                ctx.fillStyle = 'rgba(0, 212, 255, 0.2)';
                const tagWidth = ctx.measureText(tag).width + 40;
                const tagX = (canvas.width - tagWidth) / 2;
                ctx.fillRect(tagX, y - 15, tagWidth, 30);
                
                // Tag border
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 1;
                ctx.strokeRect(tagX, y - 15, tagWidth, 30);
                
                // Tag text
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'center';
                ctx.fillText(tag, canvas.width / 2, y + 5);
            });
            
            // Branding
            ctx.fillStyle = '#666';
            ctx.font = '14px IBM Plex Mono, monospace';
            ctx.textAlign = 'center';
            ctx.fillText('steamai.com', canvas.width / 2, canvas.height - 30);
            
            // Copy to clipboard
            canvas.toBlob(blob => {
                if (blob) {
                    const item = new ClipboardItem({ 'image/png': blob });
                    navigator.clipboard.write([item]).then(() => {
                        alert('DNA card copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy image:', err);
                        // Fallback to text
                        const text = `My Steam DNA: ${tags.join(' • ')} — steamai.com`;
                        navigator.clipboard.writeText(text).then(() => {
                            alert('DNA tags copied to clipboard!');
                        });
                    });
                }
            });
        }
