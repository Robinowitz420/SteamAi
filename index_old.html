            const topGames = steamData.games
                .sort((a, b) => (b.playtime_forever || 0) - (a.playtime_forever || 0))
                .slice(0, 10)
                .map(game => `${game.name}: ${Math.round((game.playtime_forever || 0) / 60)} hours`)
                .join('\n');
            
            return `Analyze this Steam gaming data and provide a behavioral profile:

Top Played Games:
${topGames}

Total Games: ${steamData.games.length}
Unplayed Games: ${steamData.games.filter(g => (g.playtime_forever || 0) === 0).length}

Provide insights on:
1. Gaming patterns and preferences
2. Time investment habits
3. Genre preferences based on playtime
4. Library completion tendency
5. Any notable behavioral patterns

Keep it concise and actionable, around 200-250 words.`;
        }

        // Get recommendations
        async function getRecommendations() {
            const mood = document.querySelector('.mood-btn.selected')?.dataset.mood;
            const time = document.getElementById('availableTime').value;
            
            if (!mood) {
                alert('Please select your mood');
                return;
            }
            
            showLoading(true);
            
            try {
                const prompt = createRecommendationPrompt(mood, time);
                const recommendations = await callClaude(prompt);
                
                document.getElementById('recommendations').innerHTML = `
                    <div style="margin-top: 20px;">
                        <h4 style="color: #00d4ff; margin-bottom: 15px;">Tonight's Recommendations</h4>
                        ${recommendations}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error getting recommendations:', error);
                document.getElementById('recommendations').innerHTML = 
                    '<p style="color: #f44336;">Unable to get recommendations</p>';
            } finally {
                showLoading(false);
            }
        }

        // Create recommendation prompt
        function createRecommendationPrompt(mood, time) {
            const availableGames = steamData.games.filter(game => 
                game.playtime_forever < 120 // Less than 2 hours played
            );
            
            return `Based on this Steam data, recommend 3 games to play tonight:

MOOD: ${mood}
AVAILABLE TIME: ${time} minutes
AVAILABLE GAMES: ${availableGames.slice(0, 20).map(g => g.name).join(', ')}

USER PROFILE: ${steamData.profile || 'No profile available'}

Provide recommendations in this format for each game:
**Game Name**
Reason: [Why it matches mood/time]
Play Pattern: [Suggested approach]

Focus on games that match the mood and time constraints while considering their existing gaming patterns.`;
        }

        // Analyze wishlist
        async function analyzeWishlist() {
            if (steamData.wishlist.length === 0) {
                document.getElementById('wishlistAnalysis').innerHTML = 
                    '<p style="color: #a0a0a0;">No wishlist items found</p>';
                return;
            }
            
            showLoading(true);
            
            try {
                const prompt = createWishlistPrompt();
                const analysis = await callClaude(prompt);
                
                document.getElementById('wishlistAnalysis').innerHTML = `
                    <div style="margin-top: 20px;">
                        <h4 style="color: #00d4ff; margin-bottom: 15px;">Wishlist Analysis</h4>
                        ${analysis}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error analyzing wishlist:', error);
                document.getElementById('wishlistAnalysis').innerHTML = 
                    '<p style="color: #f44336;">Unable to analyze wishlist</p>';
            } finally {
                showLoading(false);
            }
        }

        // Create wishlist prompt
        function createWishlistPrompt() {
            return `Analyze this Steam wishlist and provide verdicts:

WISHLIST: ${steamData.wishlist.slice(0, 15).map(item => item.name || item).join(', ')}

USER PROFILE: ${steamData.profile || 'No profile available'}
OWNED GAMES: ${steamData.games.slice(0, 20).map(g => g.name).join(', ')}

For each wishlist item, provide:
**Game Name**
Verdict: [YES/MAYBE/KIDDING YOURSELF]
Reason: [Brief explanation based on their gaming patterns]

Focus on whether these games align with their actual playing habits, not stated preferences.`;
        }

        // Chat functionality
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Create new chat if none exists
            if (!chatState.currentChatId) {
                createNewChat();
            }
            
            // Add user message
            addChatMessage(message, 'user');
            input.value = '';
            
            // Save message to chat state
            saveMessageToChat(message, 'user');
            
            showLoading(true);
            
            try {
                const prompt = createChatPrompt(message);
                const response = await callClaude(prompt);
                
                addChatMessage(response, 'assistant');
                saveMessageToChat(response, 'assistant');
                
            } catch (error) {
                console.error('Error in chat:', error);
                addChatMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            } finally {
                showLoading(false);
            }
        }

        // Create chat prompt
        function createChatPrompt(message) {
            // Get current chat history
            const chat = chatState.chats[chatState.currentChatId];
            
            // Build conversation history for Claude (exclude the message we just added)
            let conversationHistory = '';
            if (chat && chat.messages.length > 1) {
                conversationHistory = chat.messages.slice(0, -1).map(msg => {
                    const role = msg.role === 'user' ? 'User' : 'Assistant';
                    return `${role}: ${msg.content}`;
                }).join('\n\n');
            }
            
            // Build library data
            const libraryData = steamData.games
                .map(g => `${g.name}: ${Math.round((g.playtime_forever || 0) / 60)}h`)
                .join('\n');
            
            return `You are a brutally concise gaming advisor with access to this player's Steam library data:

LIBRARY DATA:
${libraryData}

CONVERSATION HISTORY:
${conversationHistory || 'No previous messages'}

CURRENT MESSAGE:
User: ${message}

Rules:
- Never restate the question back to the user
- Never use filler phrases like "great question", "you're welcome", "I'm happy to help"
- Max 3-4 sentences per response unless a list is genuinely needed
- If recommending a game, always verify it exists in their library before suggesting it
- Be direct and opinionated — no hedging
- If they ask for one recommendation, give one, not five
- Remember the full conversation context above
- Don't contradict yourself or forget what was already discussed`;
        }

        // Add chat message
        function addChatMessage(message, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Call Claude API
        async function callClaude(prompt) {
            const response = await fetch('http://localhost:3001/api/claude', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    apiKey: steamData.claudeApiKey,
                    prompt: prompt
                })
            });
            
            if (!response.ok) {
                const errorData = await response.text();
                throw new Error(`Claude API error: ${response.status} - ${errorData}`);
            }
            
            const data = await response.json();
            return data.response;
        }

        // Mood selector
        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Chat input enter key
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // UI helpers
        function showSetupError(message) {
            const errorDiv = document.getElementById('setupError');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 5000);
        }

        function showSetupSuccess(message) {
            const successDiv = document.getElementById('setupSuccess');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
            setTimeout(() => successDiv.classList.add('hidden'), 5000);
        }

        function showLoading(show) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                if (show) {
                    btn.disabled = true;
                    if (!btn.querySelector('.loading')) {
                        btn.innerHTML = '<span class="loading"></span> Loading...';
                    }
                } else {
                    btn.disabled = false;
                    // Restore original button text (simplified)
                    if (btn.textContent.includes('Loading')) {
                        btn.textContent = btn.textContent.replace(/.*Loading/, '').trim() || 'Submit';
                    }
                }
            });
        }

        // Load saved data on page load
        window.addEventListener('load', function() {
            const savedData = localStorage.getItem('steamData');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('steamApiKey').value = data.apiKey || '';
                document.getElementById('steamId').value = data.steamId || '';
                document.getElementById('claudeApiKey').value = data.claudeApiKey || '';
            }
            
            // Load chat history
            loadChatHistory();
        });

        // Chat Management Functions
        
        function createNewChat() {
            const chatId = 'chat_' + Date.now();
            const chat = {
                id: chatId,
                title: 'New Chat',
                messages: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            chatState.chats[chatId] = chat;
            chatState.currentChatId = chatId;
            
            saveChatHistory();
            renderChatList();
            clearChatMessages();
        }
        
        function loadChat(chatId) {
            if (!chatState.chats[chatId]) return;
            
            chatState.currentChatId = chatId;
            saveChatHistory();
            renderChatList();
            renderChatMessages(chatId);
        }
        
        function deleteChat(chatId, event) {
            event.stopPropagation();
            
            if (!confirm('Delete this chat?')) return;
            
            delete chatState.chats[chatId];
            
            if (chatState.currentChatId === chatId) {
                chatState.currentChatId = null;
                clearChatMessages();
            }
            
            saveChatHistory();
            renderChatList();
        }
        
        function saveMessageToChat(message, role) {
            if (!chatState.currentChatId) return;
            
            const chat = chatState.chats[chatState.currentChatId];
            if (!chat) return;
            
            chat.messages.push({
                role: role,
                content: message,
                timestamp: new Date().toISOString()
            });
            
            // Update chat title based on first user message
            if (chat.title === 'New Chat' && role === 'user') {
                chat.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
            }
            
            chat.updatedAt = new Date().toISOString();
            
            saveChatHistory();
            renderChatList();
        }
        
        function saveChatHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(chatState));
        }
        
        function loadChatHistory() {
            const saved = localStorage.getItem('chatHistory');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    chatState = parsed;
                    renderChatList();
                    
                    // Load most recent chat if exists
                    const chatIds = Object.keys(chatState.chats);
                    if (chatIds.length > 0) {
                        const mostRecent = chatIds.sort((a, b) => {
                            return new Date(chatState.chats[b].updatedAt) - new Date(chatState.chats[a].updatedAt);
                        })[0];
                        loadChat(mostRecent);
                    }
                } catch (error) {
                    console.error('Error loading chat history:', error);
                }
            }
        }
        
        function renderChatList() {
            const chatList = document.getElementById('chatList');
            const chatIds = Object.keys(chatState.chats).sort((a, b) => {
                return new Date(chatState.chats[b].updatedAt) - new Date(chatState.chats[a].updatedAt);
            });
            
            if (chatIds.length === 0) {
                chatList.innerHTML = '<p style="color: #666; padding: 20px; text-align: center; font-size: 13px;">No chats yet</p>';
                return;
            }
            
            chatList.innerHTML = chatIds.map(chatId => {
                const chat = chatState.chats[chatId];
                const isActive = chatId === chatState.currentChatId;
                const date = formatDate(chat.updatedAt);
                
                return `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="loadChat('${chatId}')">
                        <div class="chat-item-title">${escapeHtml(chat.title)}</div>
                        <div class="chat-item-date">${date}</div>
                        <div class="chat-item-actions">
                            <button class="chat-action-btn delete" onclick="deleteChat('${chatId}', event)" title="Delete">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderChatMessages(chatId) {
            const chat = chatState.chats[chatId];
            if (!chat) return;
            
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            
            chat.messages.forEach(msg => {
                addChatMessage(msg.content, msg.role);
            });
        }
        
        function clearChatMessages() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
            
            return date.toLocaleDateString();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
